description: >
  FHIR extension mappings — ResearchStudy.extension
  This file groups all ResearchStudy-level extensions.
  Each mapping produces one entry in the extension[] array.

mappings:

  # ── Age range (plannedAge → artifact-useContext) ─────────────────────────
  - item: Extension age range (artifact-useContext from plannedAge)
    usdm_path: |
      study.versions.studyDesigns.population.plannedAge.(
        $minVal  := minValue.value;
        $minUnit := minValue.unit.standardCode.decode;
        $maxVal  := maxValue.value;
        $maxUnit := maxValue.unit.standardCode.decode;
        $minVal and $maxVal ?
        {id: {
          "url": "http://hl7.org/fhir/StructureDefinition/artifact-useContext",
          "valueUsageContext": {
            "code": {
              "system": "http://terminology.hl7.org/CodeSystem/usage-context-type",
              "code": "age",
              "display": "Age Range"
            },
            "valueRange": {
              "low":  {"value": $minVal,  "unit": $minUnit},
              "high": {"value": $maxVal,  "unit": $maxUnit}
            }
          }
        }} : null
      )
    fhir_resource: ResearchStudy
    fhir_path: extension
    fhir_index: extension
    usdm_class: PopulationDefinition
    usdm_attribute: plannedAge

