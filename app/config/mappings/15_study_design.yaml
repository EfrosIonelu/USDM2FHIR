description: "Study design type mappings — ResearchStudy.studyDesign (SEVCO codes from studyType + cohort count)"

mappings:
  - item: Study Design type (from studyType)
    usdm_path: |
      study.versions.studyDesigns.studyType.(
        $Recode := function($c) {
          $c = "C98388" ? {"system": "https://fevir.net/sevco", "code": "SEVCO:01001", "display": "interventional research"} :
          $c = "C16084" ? {"system": "https://fevir.net/sevco", "code": "SEVCO:01002", "display": "observational research"} :
          $c = "C98722" ? {"system": "https://fevir.net/sevco", "code": "SEVCO:01038", "display": "expanded access study"} :
          $c = "C129000" ? {"system": "https://fevir.net/sevco", "code": "SEVCO:01042", "display": "expanded access study"} :
          null
        };
        $result := $Recode(code);
        $result ? {id: {"coding": [$result]}} : null
      )
    fhir_resource: ResearchStudy
    fhir_path: studyDesign
    fhir_index: studyDesign
    usdm_class: StudyDesign
    usdm_attribute: studyType

  - item: Study Design cohort design (uncontrolled when 0 cohorts)
    usdm_path: |
      study.versions.studyDesigns.(
        $count(population.cohorts) = 0 ? {id & "_uncontrolled": {"coding": [{"system": "https://fevir.net/sevco", "code": "SEVCO:01016", "display": "uncontrolled cohort design"}]}} : null
      )
    fhir_resource: ResearchStudy
    fhir_path: studyDesign
    fhir_index: studyDesign
    usdm_class: StudyDesign
    usdm_attribute: population.cohorts

