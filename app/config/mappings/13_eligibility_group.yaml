        $RefId := $nodeIds ? $nodeIds : $respIds;
        $label := $nodeIds ? "Node" : $labelResp;
        {$RefId: $label}))
    fhir_resource: Group
    fhir_path: description
    usdm_class: ExpectedResponse
    usdm_attribute: label

