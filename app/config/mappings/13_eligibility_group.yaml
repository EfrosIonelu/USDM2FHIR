        $nodeIds := $sv.extensionAttributes.extensionAttributes.valueExtensionClass[url="https://cdisc.org/usdm/extension-ExpResponseNode/class1" and extensionAttributes.extensionAttributes[valueId in $respIds]].id;
        $toDays := function($d) {
          $contains($d, "W") ? $number($replace($replace($d, "P", ""), "W", "")) * 7 :
          $contains($d, "Y") ? $number($replace($replace($d, "P", ""), "Y", "")) * 365 :
          $number($replace($replace($d, "P", ""), "D", ""))  };$GetResult := function($id){$sv.extensionAttributes.extensionAttributes.valueExtensionClass[url="https://cdisc.org/usdm/extension-ExpResponse/class_ExpectedResponse" and extensionAttributes[valueId=$ex.id]].extensionAttributes[url="https://cdisc.org/usdm/extension-ExpResponse-1/attribute-atTiming"].valueId};
        $lowDays := function($t, $v, $l) { $t = "C201357" ? -($toDays($v) + $toDays($l)) :    $t = "C201356" ? $toDays($v) - $toDays($l) :    0};
        $RefId := $nodeIds ? $nodeIds : $respIds;
        $timeArray := $nodeIds ? $GetResult($nodeIds) : $GetResult($respIds);
        $lowerArray := $timeArray@$tId.(
            $tm := $sv.studyDesigns.scheduleTimelines.timings[id = $tId];
            $lowDays($tm.type.code, $tm.value, $tm.windowLower)
          );
        {$RefId: [$lowerArray]}))
    fhir_resource: Group
